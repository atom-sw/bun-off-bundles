meta:
  name: commons-dev
  description: Language-agnostic coding discipline and workflow habits for AI-assisted development.
  long_description: |
    For developers who want an AI assistant to write disciplined code in any language. It
    gathers a compact set of workflow habits, spanning testing, commits, documentation,
    security, and keeping the assistant's attention on the task, and adds a few quiet
    conveniences: on-demand documentation checks, quick access to current library reference,
    and terser command output. Use it as the common footing under any project, whatever the
    language or tools.
  version: "0.1.0"
  author: bugcounting.net

rules:
  - verify-your-work
  - writing-tests
  - lint-exceptions
  - explore-then-code
  - match-project-conventions
  - precise-context
  - vcs-etiquette
  - commit-conventions
  - security-basics
  - documentation-style
  - writing-docs
  - context-management
  # Claude and OpenCode get a real rtk hook/plugin from the post_install hook;
  # antigravity has none, so inline rtk usage guidance into its GEMINI.md.
  - name: rtk-usage
    available_on: [antigravity]

skills:
  - doc-check

mcp_servers:
  - context7

settings:
  opencode:
    plugin:
      - "@tarquinen/opencode-dcp"

mise:
  - mise/mise.toml

hooks:
  post_install:
    - script: mise-install   # install the toolchain first
    - script: rtk-init       # then activate rtk

event_hooks:
  - name: mise-install
    event: session_start
    command: "mise trust 2>/dev/null; mise install 2>/dev/null || true"
