meta:
  name: general-dev
  description: Adds project-wide code intelligence (the llm-tldr MCP server) on top of commons-dev.
  long_description: |
    Extends commons-dev with the llm-tldr MCP server: compressed, project-wide code-intelligence
    context, warmed on deploy. Deploying it also installs commons-dev's baseline rules, the
    context7 docs server, and rtk output compression. Language-specific stacks (such as python)
    extend this bundle.
  version: "0.1.1"
  author: bun-off

extends: ../commons-dev

mcp_servers:
  - llm-tldr

mise:
  - mise/mise.toml

hooks:
  post_install:
    - script: tldr-warm   # build the llm-tldr index (mise-install runs first, from commons-dev)
