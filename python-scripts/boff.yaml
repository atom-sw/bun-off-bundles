meta:
  name: python-scripts
  description: A lightweight Python setup for standalone, single-file scripts.
  long_description: |
    For anyone writing standalone Python scripts: single-file programs and small utilities
    with few or no dependencies. It stays deliberately minimal, leaning on the standard
    library, lightweight testing, and just enough linting and type checking to keep a script
    honest. The payoff is portability: a script that needs no outside packages runs anywhere
    with a plain `python script.py`, and there is no packaging or scaffolding to set up first.
  version: "0.1.0"
  author: bugcounting.net

extends: ../commons-dev

rules:
  - name: python-script-structure
    category: python-scripts-dev
    globs: ["**/*.py"]
  - name: python-script-style
    category: python-scripts-dev
    globs: ["**/*.py"]
  - name: python-script-dependencies
    category: python-scripts-dev
    globs: ["**/*.py"]
  - name: python-script-testing
    category: python-scripts-dev
    globs: ["**/*.py", "**/test_*.py"]

skills:
  - new-script

slash_commands:
  - name: new-script
    available_on: [opencode]

event_hooks:
  - name: ruff-format
    event: after_edit
    script: ruff-format.sh
    available_on: [claude]

settings:
  opencode:
    formatter:
      ruff:
        # Only format when the project opts into ruff and ruff/uv is available,
        # so the bundle never reformats a non-ruff project. $1 is the file ($FILE).
        command:
          - sh
          - "-c"
          - '{ [ -f ruff.toml ] || [ -f .ruff.toml ] || grep -q "^\[tool\.ruff" pyproject.toml 2>/dev/null; } || exit 0; if command -v ruff >/dev/null 2>&1; then ruff format "$1"; elif command -v uv >/dev/null 2>&1; then uv run ruff format "$1"; fi'
          - _
          - "$FILE"
        extensions: [".py", ".pyi"]

mise:
  - mise/mise.toml
